<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lacquer&family=Luckiest+Guy&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <title>D S Lewis - Look</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <header>
      <div class="name">D S Lewis</div>
    </header>
    <div class="waves">
      <div class="wave-1"></div>
      <div class="wave-2"></div>
      <div class="wave-3"></div>
      <nav>
        <ul>
          <li>
            <a href="/">News</a>
          </li>
          <li>
            <a href="/writing">Read</a>
          </li>
          <li>
            <a href="/stuff">Look</a>
          </li>
          <li>
            <a href="/about">About</a>
          </li>
        </ul>
      </nav>
    </div>

    <main>
      <section>
        <h2 data-title="Nothing to see">Nothing to see</h2>
        <p>
          I'll be sticking random projects and such in here for safe-keeping.
          But don't say anything, I have been telling everyone my middle name is
          'Danger'.
        </p>
      </section>
    </main>
    <footer>
      <div class="container">
        Copyright D.S. Lewis 2026. All rights reserved.
      </div>
    </footer>
    <script>
      const headings = document.querySelectorAll("h2");

      function checkHeading(el) {
        const rect = el.getBoundingClientRect();

        const center = window.innerHeight / 2;
        const zoneTop = center - 50;
        const zoneBottom = center + 50;

        const overlaps = rect.bottom >= zoneTop && rect.top <= zoneBottom;

        if (overlaps) {
          el.classList.add("fill");
          observer.unobserve(el);
        }
      }

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              checkHeading(entry.target);
            }
          });
        },
        {
          rootMargin: "200px 0px 200px 0px",
          threshold: 0,
        }
      );

      headings.forEach((h) => observer.observe(h));

      window.addEventListener(
        "scroll",
        () => {
          headings.forEach(checkHeading);
        },
        { passive: true }
      );

      window.addEventListener("resize", () => {
        headings.forEach(checkHeading);
      });
    </script>
  </body>
</html>
